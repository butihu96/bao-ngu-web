name: Bot Bao Ngu Sneaker

on:
  schedule:
    - cron: '0 */4 * * *' # Tự động chạy 4 tiếng 1 lần
  workflow_dispatch: # Tạo nút bấm chạy thủ công

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code từ kho về
        uses: actions/checkout@v4

      - name: Cài đặt môi trường Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cài đặt thư viện Google
        run: pip install gspread google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Lấy Chìa khóa từ Két sắt
        env:
          CREDENTIALS_B64: ${{ secrets.CREDENTIALS_B64 }}
          TOKEN_B64: ${{ secrets.TOKEN_B64 }}
        run: |
          echo "$CREDENTIALS_B64" | base64 --decode > credentials.json
          echo "$TOKEN_B64" | base64 --decode > token.pickle

      - name: Gọi Bot chui vào 4 kho lấy Data
        run: python sync_data.py

      - name: Đóng gói Data mới lên Web bằng Đòn Hủy Diệt
        run: |
          git config --global user.name "BaoNgu-Bot"
          git config --global user.email "bot@baongu.store"
          
          # 1. Cất riêng file data.json (thành quả) ra ngoài vùng an toàn
          cp data.json /home/runner/data.json
          
          # 2. ĐỐT SẠCH KHO: Hủy mọi file rác, file token tạm để dọn đường
          git reset --hard
          git clean -fd
          
          # 3. Kéo code mới nhất từ Github về (lúc này kho sạch 100%, đố báo lỗi được)
          git pull origin main
          
          # 4. Trả file data.json vào lại đúng vị trí cũ
          cp /home/runner/data.json ./data.json
          
          # 5. Lưu và đẩy lên web
          git add data.json
          git commit -m "🚀 Bot tự động cập nhật kho giày" || echo "Không có data mới"
          git push origin main
